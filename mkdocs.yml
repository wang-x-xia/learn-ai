site_name: Learn AI — AI 前沿知识库
site_description: 个人 AI 前沿知识库，追踪技术方案革新与工程亮点
site_url: ""
repo_url: ""

docs_dir: docs

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      separator: '[\s\-\.]+'
      lang:
        - zh
        - en

markdown_extensions:
  - footnotes
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.caret
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - 首页: index.md
  - 基础理论:
    - foundations/index.md
    - Transformer 架构: foundations/transformer.md
    - 大语言模型: foundations/large-language-models.md
    - Mamba 与 SSM: foundations/mamba-and-ssm.md
    - 多模态 AI: foundations/multimodal-ai.md
    - 微调与对齐: foundations/training-and-alignment.md
  - 应用技术:
    - applied/index.md
    - AI Agent 智能体: applied/ai-agents.md
    - Agent Hooks: applied/agent-hooks.md
    - Subagent 实践: applied/subagents.md
    - 提示工程: applied/prompt-engineering.md
    - 检索增强生成 (RAG): applied/rag.md
    - AI 基础设施: applied/infrastructure.md
  - 前沿研究:
    - research/index.md
    - 推理与规划: research/reasoning-and-planning.md
    - AI 安全与治理: research/safety-and-governance.md
    - 新兴前沿方向: research/emerging-frontiers.md
  - 产品档案:
    - coding-agents/index.md
    - Cursor: coding-agents/cursor.md
    - GitHub Copilot: coding-agents/github-copilot.md
    - Claude Code: coding-agents/claude-code.md
    - Windsurf: coding-agents/windsurf.md
    - OpenAI Codex: coding-agents/codex.md
    - Gemini Code Assist: coding-agents/gemini-code-assist.md
    - Amazon Q Developer: coding-agents/amazon-q-developer.md
    - Cline: coding-agents/cline.md
    - Aider: coding-agents/aider.md
    - Continue: coding-agents/continue.md
    - Kilo Code: coding-agents/kilo-code.md
    - Sourcegraph Cody: coding-agents/sourcegraph-cody.md
    - Tabnine: coding-agents/tabnine.md
    - Trae: coding-agents/trae.md
  - 行业全景:
    - landscape/index.md
    - 模型动态跟踪: landscape/model-tracker.md
  - 精选资源: resources.md

extra:
  social: []
  generator: false
