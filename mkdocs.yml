    - Agent 记忆系统: applied/memory-systems.md
    - Agent 工具接入: applied/agent-tools.md
    - Agent Skills: applied/agent-skills.md
    - Agent 间协议: applied/agent-protocols.md
    - Agent Hooks: applied/agent-hooks.md
    - Subagent 实践: applied/subagents.md
